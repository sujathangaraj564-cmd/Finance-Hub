<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Hub Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<div class="sidebar">

  <h2>Finance Hub</h2>

  <ul>
    <li onclick="location.href='dashboard.html'">🏠 Dashboard</li>
    <li onclick="location.href='investment.html'">💰 Investments</li>
    <li onclick="location.href='members.html'">👥 Members</li>
    <li onclick="location.href='analytics.html'">📊 Analytics</li>
    <li onclick="location.href='transactions.html'">💳 Transactions</li>
    <li onclick="location.href='settings.html'">⚙ Settings</li>
    <li onclick="location.href='index.html'">🚪 Logout</li>
  </ul>

</div>

<div class="main-content">

  <div class="top-bar">
    <h1>Dashboard</h1>

    <div class="profile">
      Welcome Admin 👋
    </div>
  </div>

  <div class="card-container">

    <div class="card" style="margin-top:30px;">
  <h3>Recent Activity</h3>

  <ul
    id="activityList"
    style="
      list-style:none;
      margin-top:20px;
      color:white;
    "
  >
  </ul>
</div>

    <div class="card" style="margin-top:30px;">
  <h3>Member Growth Analytics</h3>

  <div id="chartContainer">
    <div class="bar">
      <span>Members</span>
      <div class="bar-fill" id="memberBar"></div>
    </div>
  </div>
</div>

    <div class="card">
  <h3>Total Members</h3>
  <h2 id="totalMembers">0</h2>
</div>

<div class="card">
  <h3>Total Investments</h3>
  <h2 id="totalInvestments">₹0</h2>
</div>

<div class="card">
  <h3>Total Transactions</h3>
  <h2 id="totalTransactions">0</h2>
</div>

<div class="card">
  <h3>Total Amount</h3>
  <h2 id="totalAmount">₹0</h2>
</div>
  </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
