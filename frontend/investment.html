<!DOCTYPE html>
<html>
<head>
  <title>Investments</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<div class="sidebar">
  <h2>Finance Hub</h2>

  <ul>
    <li onclick="location.href='dashboard.html'">🏠 Dashboard</li>
    <li onclick="location.href='investment.html'">💰 Investments</li>
    <li onclick="location.href='members.html'">👥 Members</li>
    <li onclick="location.href='analytics.html'">📊 Analytics</li>
    <li onclick="location.href='transactions.html'">💳 Transactions</li>
    <li onclick="location.href='settings.html'">⚙ Settings</li>
    <li onclick="location.href='index.html'">🚪 Logout</li>
  </ul>
</div>

<div class="main-content">

  <h1 style="color:#d4af37;">
    Investment Management
  </h1>

  <br>

  <div class="card">

    <h3>Add Investment</h3>

    <br>

    <input
      type="text"
      id="investorName"
      placeholder="Investor Name"
      style="width:100%;padding:12px;margin-bottom:10px;"
    >

    <input
      type="number"
      id="investmentAmount"
      placeholder="Investment Amount"
      style="width:100%;padding:12px;margin-bottom:10px;"
    >

    <button onclick="addInvestment()">
      Add Investment
    </button>

  </div>

  <br>

  <div class="card">

    <h3>Total Investment</h3>

    <h2
      id="totalInvestment"
      style="color:#d4af37;"
    >
      ₹0
    </h2>

  </div>

  <br>

  <div class="card">

    <h3>Investment List</h3>

    <br>

    <ul id="investmentList"></ul>

  </div>

</div>

<script src="investment.js"></script>

</body>
</html>
