<!DOCTYPE html>
<html>
<head>
<title>Members</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<div class="sidebar">
<h2>Finance Hub</h2>

<ul>
<li onclick="location.href='dashboard.html'">🏠 Dashboard</li>
<li onclick="location.href='investment.html'">💰 Investments</li>
<li onclick="location.href='members.html'">👥 Members</li>
<li onclick="location.href='analytics.html'">📊 Analytics</li>
<li onclick="location.href='transactions.html'">💳 Transactions</li>
<li onclick="location.href='settings.html'">⚙ Settings</li>
<li onclick="location.href='index.html'">🚪 Logout</li>
</ul>

</div>

<div class="main-content">

<h1 style="color:#d4af37;">Members Management</h1>

<br>

<div class="card">

<h3>Add New Member</h3>

<br>

<input
type="text"
id="memberName"
placeholder="Member Name"
style="width:100%;padding:12px;margin-bottom:10px;">

<input
type="email"
id="memberEmail"
placeholder="Member Email"
style="width:100%;padding:12px;margin-bottom:10px;">

<button onclick="addMember()">
Add Member
</button>

</div>

<br>

<div class="card">

<h3>Members List</h3>

<br>

<input
  type="text"
  id="searchInput"
  placeholder="Search Member..."
  onkeyup="searchMember()"
  style="width:100%;padding:12px;margin-bottom:20px;"
>

<ul id="memberList"></ul>

</div>

</div>

<script src="members.js"></script>

</body>
</html>
